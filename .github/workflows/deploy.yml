name: Deploy Laravel to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, fileinfo, pdo_mysql, openssl
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install NPM Packages
        run: npm ci

      - name: Build Vite Assets
        run: npm run build

      - name: Copy built assets to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.PORT }} -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          scp -P ${{ secrets.PORT }} -r public/build ${{ secrets.USERNAME }}@${{ secrets.HOST }}:~/repositories/Backoffice-ERP/public/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            cd ~/repositories/Backoffice-ERP

            git fetch origin
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader

            php artisan down || true

            php artisan migrate --force

            php artisan optimize:clear

            php artisan optimize

            php artisan up
